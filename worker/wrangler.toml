name = "fair-copy-licensing"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Populate these ids after running:
#   wrangler kv namespace create LICENSE_CODES
#   wrangler kv namespace create CONSUMED_LICENSES
[[kv_namespaces]]
binding = "LICENSE_CODES"
id = "REPLACE_WITH_KV_ID_AFTER_CREATE"

[[kv_namespaces]]
binding = "CONSUMED_LICENSES"
id = "REPLACE_WITH_KV_ID_AFTER_CREATE"

# Secrets bound via `wrangler secret put`:
#   ED25519_PRIVATE_KEY  — PKCS8 PEM from fair-copy/scripts/generate-keypair.ts
#   MINT_API_KEY         — random 32-byte hex string (openssl rand -hex 32)

[observability]
enabled = true
