name = "fair-copy-licensing"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain. Cloudflare auto-creates the DNS record + provisions TLS.
# Requires `blackletter.studio` to be an active zone in this account — it is.
[[routes]]
pattern = "fair-copy.blackletter.studio"
custom_domain = true

# Per-IP rate limits at the Cloudflare edge. Enforced before the Worker
# executes — if the limit is exceeded, `.limit()` returns { success: false }
# and we reject with 429 without touching KV.
#
# namespace_id is an arbitrary 1-999999 integer chosen by us; it
# distinguishes our limiters from any other Worker's in the account.
[[unsafe.bindings]]
name = "REDEEM_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "MINT_LIMIT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# Populate these ids after running:
#   wrangler kv namespace create LICENSE_CODES
#   wrangler kv namespace create CONSUMED_LICENSES
[[kv_namespaces]]
binding = "LICENSE_CODES"
id = "60cc5e67e1894e52b89bc9bcc9613db7"

[[kv_namespaces]]
binding = "CONSUMED_LICENSES"
id = "80dcb3106b3a445293c282fde6b06690"

# Secrets bound via `wrangler secret put`:
#   ED25519_PRIVATE_KEY  — PKCS8 PEM from fair-copy/scripts/generate-keypair.ts
#   MINT_API_KEY         — random 32-byte hex string (openssl rand -hex 32)

[observability]
enabled = true
